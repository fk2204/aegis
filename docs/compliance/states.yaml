# AEGIS state compliance matrix (machine-readable).
#
# This file is the single source of truth for the per-state regulatory
# surface AEGIS enforces. Loaded at boot by aegis.compliance.state_matrix.
# Strict Pydantic validation — typo here = boot fails closed.
#
# All values for Tier 1 states are sourced from
# docs/AEGIS_MASTER_PLAN.md §8.2 and §8.5. Where the master plan does not
# give an explicit citation, the entry is marked with a TODO: verify note
# in the per-state folder under docs/compliance/states/{ST}/.
#
# Schema:
#   - Tier 1: CFDL enacted, full disclosure surface, locked Jinja template.
#   - Tier 2: pending bill, watch list — no live enforcement.
#   - Tier 3: no MCA-specific law; generate defensive disclosure only.
#
# Version bumps: increment ``version`` on every substantive change. The
# anti-drift boot check logs this on startup; an unexpected change is the
# operator's signal to inspect.

version: "2026.05.18"

tier_3_default:
  generate_defensive_disclosure: true
  persist_decision_snapshot: true
  flag_ag_enforcement_states: ["MA", "NJ", "DE", "MD"]

