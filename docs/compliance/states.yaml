      autodebit: prohibited_without_first_priority_lien
      broker_advance_fee: permitted
      forum_restriction: none
      ag_enforcement_risk: medium
    penalties:
      enforcement_authority: "TX OCCC"
      private_right_of_action: false
      max_per_violation_usd: 10000
      notes: "$10k per violation; no PRA. Counsel gate required before any TX deal — standard ACH-debit MCA cannot satisfy the first-priority-lien requirement."
    hard_decline_rules:
      - code: tx_autodebit_without_first_priority_lien
        message: |
          TX HB 700 prohibits automatic ACH debit unless the provider holds
          a first-priority perfected UCC security interest in the merchant's
          deposit account. Standard MCA structures cannot satisfy this.
          Decline or restructure with funder counsel.

