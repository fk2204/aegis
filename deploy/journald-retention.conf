# Mirrored at /etc/systemd/journald.conf.d/retention.conf on prod; update both together.
#
# AEGIS journald retention policy. Drop-in for systemd-journald that caps how
# much history we keep on the Hetzner box. Edit this file and the on-box
# /etc/systemd/journald.conf.d/retention.conf in lockstep, then run:
#   systemctl restart systemd-journald
# Verify with:
#   journalctl --disk-usage
#
# See deploy/RUNBOOK.md § "Journald retention policy" for full context.

[Journal]
MaxRetentionSec=30day
MaxFileSec=1week
SystemMaxUse=500M
