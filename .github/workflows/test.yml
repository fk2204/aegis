# AEGIS CI — mirrors the local `make check` gate (typecheck + lint + test).
#
# Test suite runs with CORPUS=1 (the same Make target the operator uses
# pre-commit / pre-deploy). No real secrets are needed: the storage backend
# is forced to `memory`, and the auth/data-residency boot guards are
# satisfied with throwaway placeholder values.
name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same PR/branch when a new commit lands —
# saves minutes and keeps the queue short.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: typecheck + lint + test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # Data-residency boot guard (src/aegis/api/app.py refuses to start
      # without this; tests that import the FastAPI app would 500 otherwise).
      AEGIS_DATA_RESIDENCY_CONFIRMED: "true"
      # Auth bearer token — required so authed routes don't 503 in tests.
      # Throwaway value; not a secret.
      API_BEARER_TOKEN: "ci-test-token"
      # In-memory storage backend — no Supabase, Bedrock, Close, etc.
      AEGIS_STORAGE_BACKEND: "memory"
      # uv: keep its cache in a known location for actions/cache.
      UV_CACHE_DIR: /tmp/.uv-cache

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        # No floating major tag for setup-uv; pin to the exact released version.
        uses: astral-sh/setup-uv@v8.2.0

      - name: Cache uv packages
        uses: actions/cache@v5
        with:
          path: /tmp/.uv-cache
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install dependencies (frozen)
        run: uv sync --frozen

      - name: Typecheck (mypy --strict)
        run: make typecheck

      - name: Lint (ruff)
        run: make lint

      - name: Test (pytest, CORPUS=1)
        run: make test
